<div class="trends-container">
  @for (item of trendsTable; track item.id) {
  <div class="trend-card">
    <img [src]="item.imagen" [alt]="item.title" class="trend-image">
    <div class="trend-overlay">
      <div class="category-tag">{{getCategoryName(item.codTipo)}}</div>
      <h4>{{item.title}}</h4>
      <p>{{item.description}}</p>
    </div>
  </div>
  }
  <!-- Final mobile footer within the horizontal scroll if desired, or as a static closing element -->
  <footer class="module-footer">&copy; 2024 AJ Golden Glow.</footer>
</div>
